name: Daily Commit

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write        # ← Add this block

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update - 23f2004826@ds.study.iitm.ac.in
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "23f2004826@ds.study.iitm.ac.in"
          echo "Daily update $(date)" >> log.txt
          git add log.txt
          git commit -m "Daily update $(date)"
          git push
